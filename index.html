<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#012169">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="English Vocabulary">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>🇬🇧 English Vocabulary</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Poppins:wght@400;600;700&display=swap');
  :root {
    --bg:#0f0c29; --card:#1a1545; --card2:#231d5c; --accent:#7c5cfc;
    --accent2:#ff6b9d; --gold:#ffd166; --text:#f0eeff; --muted:#a09ec0; --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(124,92,252,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(255,107,157,.12) 0%,transparent 60%);pointer-events:none;z-index:0;}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:twinkle var(--d,3s) infinite var(--del,0s);}
  @keyframes twinkle{0%,100%{opacity:.2;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}

  .wrap{position:relative;z-index:1;min-height:100vh;padding:30px 16px;max-width:560px;margin:0 auto;display:flex;flex-direction:column;}
  .home-logo{text-align:center;margin:10px 0 16px;}
  .logo-icon{font-size:60px;display:block;animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  .home-title{font-size:26px;font-weight:900;text-align:center;background:linear-gradient(135deg,#7c5cfc,#ff6b9d,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;line-height:1.3;}
  .home-sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:30px;}

  .install-btn{display:none;align-items:center;justify-content:center;gap:10px;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);color:white;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:20px;box-shadow:0 8px 24px rgba(124,92,252,.4);width:100%;}
  .install-btn.show{display:flex;}
  .installed-msg{display:none;text-align:center;color:var(--gold);font-size:13px;font-weight:700;margin-bottom:20px;}
  .installed-msg.show{display:block;}

  .topic-list{display:flex;flex-direction:column;gap:14px;}
  .topic-card{
    display:flex;align-items:center;gap:16px;
    background:linear-gradient(160deg,var(--card),var(--card2));
    border:1.5px solid var(--card-border);
    border-radius:20px;padding:20px 18px;cursor:pointer;
    font-family:'Tajawal',sans-serif;color:var(--text);
    transition:all .25s;text-align:right;
  }
  .topic-card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(var(--card-glow),.3);}
  .topic-card.disabled{opacity:.45;cursor:default;}
  .topic-card.disabled:hover{transform:none;box-shadow:none;}
  .topic-icon{font-size:38px;flex-shrink:0;width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);}
  .topic-info{flex:1;}
  .topic-name{font-size:17px;font-weight:800;margin-bottom:3px;}
  .topic-sub{font-size:12.5px;color:var(--muted);}
  .topic-arrow{font-size:18px;color:var(--muted);}
  .soon-badge{font-size:11px;background:rgba(255,209,102,.15);color:var(--gold);padding:3px 10px;border-radius:20px;font-weight:700;}

  .info-card{background:var(--card);border:1.5px solid rgba(124,92,252,.3);border-radius:var(--radius);padding:18px;margin-top:26px;font-size:13.5px;color:var(--muted);line-height:1.9;}
  .info-card b{color:var(--text);}

  .quiz-overlay{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;flex-direction:column;}
  .quiz-overlay.active{display:flex;}
  .overlay-topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card2);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;}
  .overlay-close{background:var(--card);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .overlay-close:hover{background:var(--accent2);}
  .overlay-title{font-weight:800;font-size:14px;}
  .quiz-frame{flex:1;width:100%;border:none;background:var(--bg);}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="wrap">
  <div class="home-logo"><span class="logo-icon">🇬🇧</span></div>
  <div class="home-title">English Vocabulary</div>
  <div class="home-sub">اختر المقطع الذي تريد التدرب عليه</div>

  <button class="install-btn" id="installBtn">📲 ثبّت التطبيق على هاتفك</button>
  <div class="installed-msg" id="installedMsg">✅ التطبيق مثبّت بالفعل على جهازك</div>

  <div class="topic-list">
    <button class="topic-card" style="--card-border:rgba(124,92,252,.5);--card-glow:124,92,252" onclick="openTopic('sequence1.html','Sequence 1')">
      <span class="topic-icon">🧳</span>
      <span class="topic-info">
        <span class="topic-name">Sequence 1</span><br>
        <span class="topic-sub">Synonyms & Antonyms — المرادفات والأضداد</span>
      </span>
      <span class="topic-arrow">‹</span>
    </button>
    <button class="topic-card disabled">
      <span class="topic-icon">📘</span>
      <span class="topic-info">
        <span class="topic-name">Sequence 2</span><br>
        <span class="topic-sub">قريباً</span>
      </span>
      <span class="soon-badge">قريباً</span>
    </button>
    <button class="topic-card disabled">
      <span class="topic-icon">📗</span>
      <span class="topic-info">
        <span class="topic-name">Sequence 3</span><br>
        <span class="topic-sub">قريباً</span>
      </span>
      <span class="soon-badge">قريباً</span>
    </button>
    <button class="topic-card disabled">
      <span class="topic-icon">📙</span>
      <span class="topic-info">
        <span class="topic-name">Sequence 4</span><br>
        <span class="topic-sub">قريباً</span>
      </span>
      <span class="soon-badge">قريباً</span>
    </button>
  </div>

  <div class="info-card">
    <b>💡 تعليمات:</b><br>
    اختر المقطع الذي تريد التدرب عليه. سيتم إضافة المقاطع 2، 3، و4 لاحقاً. يمكنك الرجوع إلى القائمة الرئيسية في أي وقت بالضغط على زر الإغلاق أعلى النافذة.
  </div>
</div>

<div class="quiz-overlay" id="quizOverlay">
  <div class="overlay-topbar">
    <button class="overlay-close" id="closeBtn" onclick="closeTopic()">✕</button>
    <span class="overlay-title" id="overlayTitle"></span>
  </div>
  <iframe class="quiz-frame" id="quizFrame"></iframe>
</div>

<script>
  const starsEl = document.getElementById('stars');
  for(let i=0;i<50;i++){
    const s = document.createElement('div');
    s.className='star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.setProperty('--d',(2+Math.random()*3)+'s');
    s.style.setProperty('--del',(Math.random()*3)+'s');
    starsEl.appendChild(s);
  }

  function openTopic(src, title){
    const overlay = document.getElementById('quizOverlay');
    const frame = document.getElementById('quizFrame');
    document.getElementById('overlayTitle').textContent = title;
    frame.src = src;
    overlay.classList.add('active');
  }

  function closeTopic(){
    const overlay = document.getElementById('quizOverlay');
    const frame = document.getElementById('quizFrame');
    overlay.classList.remove('active');
    frame.src = 'about:blank';
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }

  // ===== INSTALL PROMPT HANDLING =====
  let deferredPrompt = null;
  const installBtn = document.getElementById('installBtn');
  const installedMsg = document.getElementById('installedMsg');

  function isStandalone(){
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }

  if (isStandalone()){
    installedMsg.classList.add('show');
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if(!isStandalone()) installBtn.classList.add('show');
  });

  installBtn.addEventListener('click', async () => {
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.classList.remove('show');
    if(outcome === 'accepted') installedMsg.classList.add('show');
  });

  window.addEventListener('appinstalled', () => {
    installBtn.classList.remove('show');
    installedMsg.classList.add('show');
  });
</script>
</body>
</html>
